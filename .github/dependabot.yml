version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: "America/Los_Angeles"
    open-pull-requests-limit: 5
    groups:
      minor-and-patch:
        update-types:
          - minor
          - patch
    ignore:
      # typescript-eslint@8.x peer-caps TypeScript at <6.1.0; hold TS 6.x
      # until typescript-eslint ships support. Re-evaluate when
      # typescript-eslint releases a version with `typescript: '>=6.x'`.
      - dependency-name: "typescript"
        versions: ["6.x"]
    labels:
      - dependencies
    commit-message:
      prefix: "chore(deps)"
      include: scope

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: monthly
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: "chore(ci)"
      include: scope
