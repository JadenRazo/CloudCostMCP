name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Minimal steps to reproduce the behavior
      placeholder: |
        1. Run `cloudcost estimate ...`
        2. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened (include error output if applicable)
    validations:
      required: true
  - type: input
    id: node-version
    attributes:
      label: Node.js Version
      placeholder: "e.g. 20.11.0"
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Operating System
      placeholder: "e.g. Ubuntu 22.04, macOS 14.3"
    validations:
      required: true
  - type: input
    id: package-version
    attributes:
      label: Package Version
      placeholder: "e.g. 0.3.0"
    validations:
      required: true
  - type: dropdown
    id: cloud-provider
    attributes:
      label: Cloud Provider
      options:
        - AWS
        - Azure
        - GCP
        - Multiple
        - N/A
    validations:
      required: false
  - type: input
    id: terraform-version
    attributes:
      label: Terraform / OpenTofu Version
      placeholder: "e.g. Terraform 1.7.0, OpenTofu 1.6.2"
    validations:
      required: false
  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Any other relevant information (config, Terraform snippets, logs)
    validations:
      required: false
