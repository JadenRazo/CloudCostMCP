name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this feature solve? What limitation are you hitting?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How would you like this to work?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any workarounds or alternative approaches you've considered
    validations:
      required: false
  - type: dropdown
    id: scope
    attributes:
      label: Area
      options:
        - Pricing (AWS/Azure/GCP)
        - Terraform Parsing
        - Cost Calculation
        - CLI
        - MCP Tools
        - Reporting / Output
        - GitHub Actions
        - Other
    validations:
      required: false
  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Any other relevant information, screenshots, or examples
    validations:
      required: false
