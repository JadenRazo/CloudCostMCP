# Example workflow — copy this file to your repository's .github/workflows/ directory
# and adjust the inputs to match your project layout.

name: Terraform Cost Estimate

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  cost-estimate:
    name: Cost Estimate
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Fetch enough history so the action can diff against the base branch
          fetch-depth: 0

      - name: Run CloudCost estimate
        uses: ./.github/actions/cost-estimate
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          # Optionally pin a specific directory instead of auto-detecting:
          # terraform_dir: "./terraform"
          # providers: "aws,azure,gcp"
          # format: "markdown"
